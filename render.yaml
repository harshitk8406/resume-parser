services:
  - type: web
    name: resume-parser-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: "4096"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "8000"
